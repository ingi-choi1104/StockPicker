name: stockpicker
description: "증권사 이벤트 모아보기 앱"
publish_to: 'none'

version: 1.0.1+2

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  provider: ^6.1.2
  http: ^1.2.0
  url_launcher: ^6.3.0
  intl: ^0.19.0
  cached_network_image: ^3.4.1
  shared_preferences: ^2.3.2
  flutter_svg: ^2.0.10+1
  html: ^0.15.4
  firebase_core: ^3.13.0
  cloud_firestore: ^5.6.6
  google_mobile_ads: ^5.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/icon.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true
